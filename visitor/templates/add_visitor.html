{% extends 'base.html' %}

{% block title %}Add Visitor - SEA HSM{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark mb-0">Add Visitor</h2>
            <a href="{% url 'list_visitors' %}" class="btn btn-outline-secondary">
                <i class="bi bi-x-circle me-1"></i> Cancel
            </a>
        </div>

        <div class="card border-0 shadow-sm rounded-3">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}

                    <h5 class="fw-bold mb-4 text-primary border-bottom pb-2">Visitor Details</h5>
                    <div class="row g-3">
                        <!-- Student being visited -->
                        <div class="col-12">
                            <label for="student" class="form-label fw-medium">Student Being Visited <span class="text-danger">*</span></label>
                            <select class="form-select" id="student" name="student" required>
                                <option value="" selected disabled>Select a student...</option>
                                {% for s in students %}
                                <option value="{{ s.id }}">{{ s.name }} ({{ s.reg_number }}) — Room {{ s.room }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Visitor name -->
                        <div class="col-md-6">
                            <label for="visitor_name" class="form-label fw-medium">Visitor Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="visitor_name" name="visitor_name" required placeholder="Enter visitor's full name">
                        </div>

                        <!-- Visit date -->
                        <div class="col-md-6">
                            <label for="visit_date" class="form-label fw-medium">Visit Date <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" id="visit_date" name="visit_date" required>
                        </div>

                        <!-- Visit time -->
                        <div class="col-md-6">
                            <label for="visit_time" class="form-label fw-medium">Visit Time <span class="text-danger">*</span></label>
                            <input type="time" class="form-control" id="visit_time" name="visit_time" required>
                        </div>

                        <!-- Visit reason -->
                        <div class="col-md-6">
                            <label for="visit_reason" class="form-label fw-medium">Reason for Visit <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="visit_reason" name="visit_reason" required placeholder="e.g., Family visit, Delivery...">
                        </div>
                    </div>

                    <div class="mt-4 d-flex justify-content-end">
                        <button type="submit" class="btn btn-primary shadow-sm">
                            <i class="bi bi-plus-circle me-1"></i> Add Visitor
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
