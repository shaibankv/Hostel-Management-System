{% extends 'base.html' %}

{% block title %}Add Attendance Record - SEA HSM{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-dark mb-0">Add Attendance Record</h2>
    <a href="{% url 'presence_list' %}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i> Back to List
    </a>
</div>

{% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
{% endif %}

<div class="card border-0 shadow-sm rounded-3" style="max-width: 640px;">
    <div class="card-body p-4">
        <form method="POST">
            {% csrf_token %}

            <!-- Student -->
            <div class="mb-3">
                <label for="student" class="form-label fw-semibold">Student <span class="text-danger">*</span></label>
                <select name="student" id="student" class="form-select" required>
                    <option value="" disabled selected>— Select a student —</option>
                    {% for student in students %}
                    <option value="{{ student.id }}">{{ student.name }} ({{ student.reg_number }})</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Date Out -->
            <div class="mb-3">
                <label for="date_out" class="form-label fw-semibold">Date Out <span class="text-danger">*</span></label>
                <input type="date" name="date_out" id="date_out" class="form-control" required>
            </div>

            <!-- Time Out -->
            <div class="mb-3">
                <label for="time_out" class="form-label fw-semibold">Time Out <span class="text-danger">*</span></label>
                <input type="time" name="time_out" id="time_out" class="form-control" required>
            </div>

            <!-- Reason -->
            <div class="mb-4">
                <label for="reason" class="form-label fw-semibold">Reason / Purpose</label>
                <textarea name="reason" id="reason" rows="3" class="form-control" placeholder="e.g. Medical appointment, family visit…"></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-save me-1"></i> Save Record
                </button>
                <a href="{% url 'presence_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
