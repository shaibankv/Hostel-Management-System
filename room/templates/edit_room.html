{% extends 'base.html' %}

{% block title %}Edit Room - SEA HSM{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark mb-0">Edit Room</h2>
            <a href="{% url 'room_list' %}" class="btn btn-outline-secondary">
                <i class="bi bi-x-circle me-1"></i> Cancel
            </a>
        </div>

        <div class="card border-0 shadow-sm rounded-3">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="block" class="form-label fw-medium">Block <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="block" name="block" value="{{ room.block }}" required>
                        </div>
                        <div class="col-md-6">
                            <label for="room_no" class="form-label fw-medium">Room Number <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="room_no" name="room_no" value="{{ room.room_no }}" required>
                        </div>
                        <div class="col-md-6">
                            <label for="capacity" class="form-label fw-medium">Capacity <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="capacity" name="capacity" value="{{ room.capacity }}" required min="1">
                        </div>
                    </div>

                    <div class="mt-4 d-flex justify-content-end">
                        <button type="submit" class="btn btn-primary shadow-sm">
                            <i class="bi bi-save me-1"></i> Update Room
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
