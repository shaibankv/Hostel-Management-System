{% extends 'base.html' %}

{% block title %}Edit Admin Profile | SEA HSM{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-sm rounded-4 mt-4">
            <div class="card-header bg-primary text-white p-4" style="background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); border-radius: 1rem 1rem 0 0;">
                <h4 class="mb-0 fw-bold"><i class="bi bi-gear-fill me-2"></i>Edit Admin Profile</h4>
                <p class="mb-0 text-white-50 mt-1">Update your details</p>
            </div>
            
            <div class="card-body p-4">
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
                </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="username" class="form-label text-muted fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-person-fill text-muted"></i></span>
                            <input type="text" class="form-control" id="username" name="username" value="{{ request.user.username }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label text-muted fw-semibold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-envelope-fill text-muted"></i></span>
                            <input type="email" class="form-control" id="email" name="email" value="{{ request.user.email }}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="first_name" class="form-label text-muted fw-semibold">First Name</label>
                            <input type="text" class="form-control" id="first_name" name="first_name" value="{{ request.user.first_name }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="last_name" class="form-label text-muted fw-semibold">Last Name</label>
                            <input type="text" class="form-control" id="last_name" name="last_name" value="{{ request.user.last_name }}">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-4 pt-3 border-top">
                        <a href="{% url 'dashboard' %}" class="btn btn-light px-4 rounded-pill">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4 rounded-pill shadow-sm">
                            <i class="bi bi-check2-circle me-1"></i> Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
